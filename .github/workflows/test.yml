name: CI - Test

on:
  push:
    branches-ignore:
      - dependabot/**
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Test on node ${{ matrix.node_version }} and ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      max-parallel: 5
      matrix:
        node_version: [ 26.x ]
        os: [ ubuntu-latest, windows-latest ]

    env:
      OBSTOR_ROOT_USER: obstor
      OBSTOR_ROOT_PASSWORD: obstor123
      OBSTOR_KMS_SECRET_KEY: 'my-obstor-key:OSMM+vkKUTCvQs9YL/CVMIMt43HFhkUpqJxTmGl6rYw='
      OBSTOR_CI_CD: true
      SERVER_ENDPOINT: localhost:9000

    steps:
      - name: Start Server
        if: ${{ matrix.os == 'ubuntu-latest' }}
        run: |
          wget --quiet -O /tmp/obstor https://dl.pgg.net/server/obstor/release/linux-amd64/obstor
          chmod +x /tmp/obstor
          /tmp/obstor -C /tmp/obstor-config server /tmp/data{1...4} &

      - run: Invoke-WebRequest -Uri https://dl.pgg.net/server/obstor/release/windows-amd64/obstor.exe -OutFile $HOME/obstor.exe
        if: ${{ matrix.os == 'windows-latest' }}

      - name: Start Obstor Server
        if: ${{ matrix.os == 'windows-latest' }}
        shell: bash
        run: |
          $HOME/obstor.exe -C $HOME/tmp/obstor-config server $HOME/tmp/data{1...4} &

      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - name: Use Node.js ${{ matrix.node_version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node_version }}
          cache: 'pnpm'

      - run: pnpm install

      - name: Run Unit and Functional Tests
        timeout-minutes: 10
        env:
          CI: true
          OBSTOR_CI_CD: true
          MINT_MODE: full
          ACCESS_KEY: obstor
          SECRET_KEY: obstor123
          ENABLE_HTTPS: 0
        run: pnpm test
